<h1>✨ Prerna's Pixel Dream World ✨</h1>

<div class="world">

  @for (goal of goals; track $index) {
<div
  class="building"
  (click)="showGoal(goal)">

      <div class="icon">
        {{ goal.icon }}
      </div>

      <div class="name">
        {{ goal.name }}
      </div>

      <div class="progress">
        {{ getProgress(goal) }}%
      </div>
    </div>
  }

</div>
